<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Retro Minesweeper - Hexagon Mode</title>
  <link rel="stylesheet" href="hexagon.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
</head>
<body>

<!-- MENU -->
<div id="menu" class="screen active">
  <img src="titleScreenHex.png" class="title-img">

  <div class="menu-buttons">
    <button onclick="startGame('easy')">EASY</button>
    <button onclick="startGame('medium')">MEDIUM</button>
    <button onclick="startGame('hard')">HARD</button>
    <button onclick="startGame('ultra')">ULTRA</button>
    <button onclick="switchToSquareMode()">SQUARE MODE</button>
    <button onclick="showHowTo()">HOW TO PLAY</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div id="status">
    <img src="title.png" alt="Retro Minesweeper - Hexagon" class="status-title">
    <button id="smiley" class="smiley" onclick="restartGame()" aria-label="Restart game">😃</button>
  </div>
  <div id="board"></div>
</div>
<!-- Instructions -->
<div id="helpOverlay" class="overlay hidden">
  <div style="font-size:16px; max-width:400px; color:#ffe600;">
    <h3>HOW TO PLAY</h3>

    <p>
      • Click a hexagon to reveal it<br>
      • Numbers show nearby mines<br>
      • Long press or rt-click to flag<br>
      • Avoid mines<br>
      • Flag all the mines!
    </p>

    <button onclick="closeHelp()">OK</button>
  </div>
</div>
<!-- GAME OVER OVERLAY -->
<div id="overlay" class="overlay hidden"></div>

<script src="hexagon.js"></script>
</body>
</html>
