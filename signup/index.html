<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Minesweeper Closed Testing</title>

  <style>
    body {
      background-color: #000;
      color: #00ff66;
      font-family: 'Courier New', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .container {
      border: 4px solid #00ff66;
      padding: 40px;
      width: 420px;
      background: #111;
      box-shadow: 0 0 20px #00ff66;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 28px;
      text-shadow: 0 0 10px #00ff66;
    }

    p {
      margin-bottom: 25px;
      line-height: 1.5;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background: #000;
      border: 2px solid #00ff66;
      color: #00ff66;
      margin-bottom: 20px;
      box-sizing: border-box;
    }

    button {
      background: #00ff66;
      color: #000;
      border: none;
      padding: 12px 24px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
</html>
