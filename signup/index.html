<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Minesweeper Closed Testing</title>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h1>RETRO MINESWEEPER</h1>

  <p>
    Join the closed testing group to help test new features,
    receive early builds, and support development.
  </p>

  <input
    type="email"
    id="email"
    placeholder="Enter your email"
    required
  >

  <button id="joinButton">
    JOIN TESTING
  </button>

  <div id="message"></div>
</div>

<script src="script.js"></script>

</body>
</html>
